<!-- NOVA ABA DE GESTÃO DE ENTREGAS (Substitua a div id="pipeline-tab" anterior por esta) -->
<div id="pipeline-tab" class="tab-content hidden">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">Gestão de Cronogramas</h2>
        <button class="btn-primary text-sm" onclick="openAddDeadlineModal()">+ Novo Prazo</button>
    </div>

    <div class="glass rounded-lg overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-[var(--bg-dark)] border-b border-[var(--border)]">
                    <th class="p-4 text-xs font-bold uppercase tracking-wider text-[var(--text-muted)]">Cliente</th>
                    <th class="p-4 text-xs font-bold uppercase tracking-wider text-[var(--text-muted)]">Copy até</th>
                    <th class="p-4 text-xs font-bold uppercase tracking-wider text-[var(--text-muted)]">Arte até</th>
                    <th class="p-4 text-xs font-bold uppercase tracking-wider text-[var(--text-muted)]">Assunto até</th>
                </tr>
            </thead>
            <tbody id="deadlines-table-body" class="divide-y divide-[var(--border)] text-sm"></tbody>
        </table>
    </div>
</div>

<!-- SCRIPT DE APOIO (Substitua as funções de renderização anteriores pelas novas abaixo) -->
<script>
    // Adicione 'deadlines' ao state (pode adicionar dentro de initialState)
    // state.deadlines = [ { clientId: 1, copy: '20/06', arte: '22/06', assunto: '25/06' }, ... ]

    const renderPipeline = () => {
        const tbody = document.getElementById('deadlines-table-body');
        tbody.innerHTML = state.clients.map(client => {
            const d = state.deadlines?.find(x => x.clientId === client.id) || { copy: '--/--', arte: '--/--', assunto: '--/--' };
            return `
                <tr class="hover:bg-[var(--bg-darker)]">
                    <td class="p-4 font-bold text-[var(--primary)]">${client.name}</td>
                    <td class="p-4"><input type="text" class="w-20 bg-transparent border-none p-0 text-sm" value="${d.copy}" onchange="updateDeadline(${client.id}, 'copy', this.value)"></td>
                    <td class="p-4"><input type="text" class="w-20 bg-transparent border-none p-0 text-sm" value="${d.arte}" onchange="updateDeadline(${client.id}, 'arte', this.value)"></td>
                    <td class="p-4"><input type="text" class="w-20 bg-transparent border-none p-0 text-sm" value="${d.assunto}" onchange="updateDeadline(${client.id}, 'assunto', this.value)"></td>
                </tr>
            `;
        }).join('');
    };

    const updateDeadline = (clientId, field, value) => {
        if(!state.deadlines) state.deadlines = [];
        let d = state.deadlines.find(x => x.clientId === clientId);
        if(!d) { d = { clientId, copy: '--/--', arte: '--/--', assunto: '--/--' }; state.deadlines.push(d); }
        d[field] = value;
        saveState();
        showToast('Prazo atualizado!');
    };
</script>
