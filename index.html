<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOK - CopyCRM & Cronogramas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: #1e293b; border: 1px solid #334155; }
        input { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; padding: 4px 8px !important; border-radius: 4px; width: 100px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Gestão de Cronogramas SEOK</h1>
        
        <div class="glass rounded-lg overflow-x-auto p-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-slate-600">
                        <th class="p-4">Cliente</th>
                        <th class="p-4">Copy até</th>
                        <th class="p-4">Arte até</th>
                        <th class="p-4">Assunto até</th>
                    </tr>
                </thead>
                <tbody id="deadlines-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // BASE DE DADOS DOS 7 CLIENTES
        const clients = [
            { id: 1, name: "Agência SEOK" },
            { id: 2, name: "Content Lab" },
            { id: 3, name: "Onnafit" },
            { id: 4, name: "Rainbow Kitchen" },
            { id: 5, name: "Metapel" },
            { id: 6, name: "OutBox" },
            { id: 7, name: "Latam Wellness" }
        ];

        // CARREGAR DADOS DO LOCALSTORAGE
        let deadlines = JSON.parse(localStorage.getItem('seok_deadlines')) || 
                        clients.map(c => ({ id: c.id, copy: '', arte: '', assunto: '' }));

        function renderTable() {
            const body = document.getElementById('deadlines-body');
            body.innerHTML = clients.map(client => {
                const d = deadlines.find(x => x.id === client.id);
                return `
                    <tr class="border-b border-slate-700">
                        <td class="p-4 font-bold text-indigo-400">${client.name}</td>
                        <td class="p-4"><input type="text" value="${d.copy}" onchange="save(${client.id}, 'copy', this.value)"></td>
                        <td class="p-4"><input type="text" value="${d.arte}" onchange="save(${client.id}, 'arte', this.value)"></td>
                        <td class="p-4"><input type="text" value="${d.assunto}" onchange="save(${client.id}, 'assunto', this.value)"></td>
                    </tr>
                `;
            }).join('');
        }

        function save(id, field, value) {
            const item = deadlines.find(x => x.id === id);
            item[field] = value;
            localStorage.setItem('seok_deadlines', JSON.stringify(deadlines));
            console.log(`Salvo: ${field} para cliente ${id}`);
        }

        renderTable();
    </script>
</body>
</html>
